name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Or "master" if that's his default branch name
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This is the magic line that points directly to his folder!
          path: './1-Professional-Portfolio'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
